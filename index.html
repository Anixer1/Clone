<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoeGallery - Generic Template</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MoeGallery</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search wallpapers, tags...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </nav>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>Categories</h3>
            <ul>
                <li><a href="#" class="active">All</a></li>
                <li><a href="#">Anime</a></li>
                <li><a href="#">Wallpapers</a></li>
                <li><a href="#">Gifs</a></li>
                <li><a href="#">3D Render</a></li>
            </ul>
            
            <h3>Tags</h3>
            <div class="tags">
                <span class="tag">#anime</span>
                <span class="tag">#landscape</span>
                <span class="tag">#cyberpunk</span>
                <span class="tag">#pixel</span>
            </div>
        </aside>

        <!-- Main Gallery -->
        <main class="gallery" id="galleryGrid">
            <!-- Gallery Items (Placeholders) -->
            <div class="card" data-title="Anime Girl Blue">
                <div class="card-image">
                    <img src="https://via.placeholder.com/300x400/1a1a2e/e94560?text=Preview+1" alt="Item 1">
                    <div class="overlay">
                        <button>Download</button>
                    </div>
                </div>
                <div class="card-info">
                    <h4>Cyberpunk City</h4>
                    <p>1920x1080</p>
                </div>
            </div>

            <div class="card" data-title="Landscape Mountains">
                <div class="card-image">
                    <img src="https://via.placeholder.com/300x400/16213e/0f3460?text=Preview+2" alt="Item 2">
                    <div class="overlay">
                        <button>Download</button>
                    </div>
                </div>
                <div class="card-info">
                    <h4>Mountain View</h4>
                    <p>3840x2160</p>
                </div>
            </div>

            <div class="card" data-title="Abstract Art">
                <div class="card-image">
                    <img src="https://via.placeholder.com/300x400/0f3460/e94560?text=Preview+3" alt="Item 3">
                    <div class="overlay">
                        <button>Download</button>
                    </div>
                </div>
                <div class="card-info">
                    <h4>Abstract Neon</h4>
                    <p>1080x1920</p>
                </div>
            </div>

            <div class="card" data-title="Fantasy Forest">
                <div class="card-image">
                    <img src="https://via.placeholder.com/300x400/533483/fff200?text=Preview+4" alt="Item 4">
                    <div class="overlay">
                        <button>Download</button>
                    </div>
                </div>
                <div class="card-info">
                    <h4>Forest Spirit</h4>
                    <p>2560x1440</p>
                </div>
            </div>
            
             <div class="card" data-title="Space Galaxy">
                <div class="card-image">
                    <img src="https://via.placeholder.com/300x400/000000/ffffff?text=Preview+5" alt="Item 5">
                    <div class="overlay">
                        <button>Download</button>
                    </div>
                </div>
                <div class="card-info">
                    <h4>Deep Space</h4>
                    <p>4K</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
